<main class="container mx-auto px-6 py-12 text-center">
    <h2 class="text-3xl font-bold mb-12">Интеллектуальные рекомендации</h2>

    <div class="max-w-2xl mx-auto bg-gradient-to-br from-blue-500 to-indigo-600 p-8 rounded-3xl text-white shadow-2xl mb-12">
        <h3 class="text-xl mb-4">AI-Агент: Генератор стратегий</h3>
        <p id="aiResponse" class="italic text-lg mb-6">"Нажмите кнопку, чтобы получить рекомендацию по улучшению ваших данных..."</p>
        <button onclick="generateRecommendation()" class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-50 transition">Сгенерировать совет</button>
    </div>

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md border border-slate-200">
        <h4 class="font-bold mb-4 flex items-center justify-center">
            <span class="mr-2">🎵</span> Фоновая AI-музыка (Suno/Udio)
        </h4>
        <audio controls class="w-full">
            <source src="your-ai-music.mp3" type="audio/mpeg">
            Ваш браузер не поддерживает аудио.
        </audio>
    </div>
</main>

<script>
    function generateRecommendation() {
        const advices = [
            "Внедрите автоматическую валидацию данных на этапе ввода.",
            "Используйте алгоритмы кластеризации для поиска скрытых дубликатов.",
            "Регулярно проводите аудит метаданных для соблюдения стандартов.",
            "Примените LLM-модели для стандартизации неструктурированных адресов."
        ];
        const random = advices[Math.floor(Math.random() * advices.length)];
        document.getElementById('aiResponse').innerText = random;
    }
</script>
