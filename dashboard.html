<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитическая Панель | DataQuality</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Гарантируем корректное отображение поверх глобального style.css */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 30px;
            margin-top: 25px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
            }
        }

        /* Контейнер для таблицы */
        .table-visible-wrapper {
            width: 100%;
            overflow-x: auto;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 20px;
        }

        /* Интеграция таблицы в ваш темный стиль */
        .white-data-table {
            width: 100%;
            border-collapse: collapse;
            color: #ffffff;
        }

        .white-data-table th {
            background-color: #1abc9c;
            color: #ffffff;
            padding: 16px;
            font-weight: 600;
            text-align: left;
            font-size: 0.95rem;
        }

        .white-data-table td {
            padding: 14px 16px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Стилизация интерактивного ввода */
        .add-row-form-panel {
            background: rgba(30, 41, 59, 0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .add-row-form-panel input {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px;
            color: #ffffff !important;
            outline: none;
            font-size: 0.95rem;
        }

        .add-row-form-panel input:focus {
            border-color: #1abc9c !important;
        }

        /* Кнопки */
        .btn-action {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-add { background: #1abc9c; color: white; }
        .btn-add:hover { background: #16a085; }
        
        .btn-delete { background: rgba(231, 76, 60, 0.2); color: #ef4444; padding: 6px 12px; border-radius: 6px; }
        .btn-delete:hover { background: #e74c3c; color: white; }
        
        .btn-reset-table { background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.1); margin-left: 10px; }
        .btn-reset-table:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }
        .filter-btn.active { background: #1abc9c; color: white; border-color: #1abc9c; }

        .chart-glass-box {
            background: rgba(30, 41, 59, 0.4);
            padding: 25px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Статусы-бейджи */
        .badge-excellent { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .badge-normal { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .badge-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">DataQuality 📊</div>
        <div class="menu">
            <a href="index.html">Главная</a>
            <a href="dashboard.html" class="active">Анализ данных</a>
            <a href="bot.html">Помощник по качестве</a>
            <a href="creators.html">Авторы</a>
        </div>
    </nav>
</header>

<main class="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
        <h2><i class="fas fa-tachometer-alt" style="color: #1abc9c;"></i> Автоматизированный ИИ-Дашборд</h2>
        <div>
            <span style="font-size: 0.95rem; color: #94a3b8;">Фильтр:</span>
            <button class="filter-btn active" onclick="filterTable('all', this)">Все</button>
            <button class="filter-btn" onclick="filterTable('bad', this)">Ошибки</button>
            <button class="btn-action btn-reset-table" onclick="resetToDefaultData()"><i class="fas fa-undo"></i> Сбросить базу</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div>
            <div class="table-visible-wrapper">
                <table id="dataTable" class="white-data-table">
                    <thead>
                        <tr>
                            <th>Система</th>
                            <th>Полнота</th>
                            <th>Точность</th>
                            <th>Авто-Статус</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <div class="add-row-form-panel">
                <input type="text" id="newSystem" placeholder="Название системы" style="flex: 2; min-width: 150px;">
                <input type="text" id="newCompleteness" placeholder="Полнота" style="flex: 1; min-width: 80px;">
                <input type="text" id="newAccuracy" placeholder="Точность" style="flex: 1; min-width: 80px;">
                <button class="btn-action btn-add" onclick="addNewRow()"><i class="fas fa-plus"></i> Добавить</button>
            </div>
        </div>

        <div class="chart-glass-box">
            <h3 style="color:#fff; margin:0 0 20px 0; font-size:1.1rem;">Живой график качества</h3>
            <div style="position: relative; height: 240px; display: flex; justify-content: center
