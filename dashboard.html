<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитическая Панель | DataQuality</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Гарантируем корректное отображение поверх глобального style.css */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 30px;
            margin-top: 25px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
            }
        }

        /* Контейнер для таблицы */
        .table-visible-wrapper {
            width: 100%;
            overflow-x: auto;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 20px;
        }

        /* Интеграция таблицы в ваш темный стиль */
        .white-data-table {
            width: 100%;
            border-collapse: collapse;
            color: #ffffff;
        }

        .white-data-table th {
            background-color: #1abc9c;
            color: #ffffff;
            padding: 16px;
            font-weight: 600;
            text-align: left;
            font-size: 0.95rem;
        }

        .white-data-table td {
            padding: 14px 16px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Стилизация интерактивного ввода (как на вашем скриншоте) */
        .add-row-form-panel {
            background: rgba(30, 41, 59, 0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .add-row-form-panel input {
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 8px;
            color: #ffffff !important;
            outline: none;
            font-size: 0.95rem;
        }

        .add-row-form-panel input:focus {
            border-color: #1abc9c !important;
        }

        /* Кнопки */
        .btn-action {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-add { background: #1abc9c; color: white; }
        .btn-add:hover { background: #16a085; }
        
        .btn-delete { background: rgba(231, 76, 60, 0.2); color: #ef4444; padding: 6px 12px; border-radius: 6px; }
        .btn-delete:hover { background: #e74c3c; color: white; }
        
        .btn-reset-table { background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255, 255, 255, 0.1); margin-left: 10px; }
        .btn-reset-table:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }
        .filter-btn.active { background: #1abc9c; color: white; border-color: #1abc9c; }

        .chart-glass-box {
            background: rgba(30, 41, 59, 0.4);
            padding: 25px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Статусы-бейджи */
        .badge-excellent { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .badge-normal { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
        .badge-critical { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">DataQuality 📊</div>
        <div class="menu">
            <a href="index.html">Главная</a>
            <a href="dashboard.html" class="active">Анализ данных</a>
            <a href="bot.html">Помощник по качестве</a>
            <a href="creators.html">Авторы</a>
        </div>
    </nav>
</header>

<main class="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
        <h2><i class="fas fa-tachometer-alt" style="color: #1abc9c;"></i> Автоматизированный ИИ-Дашборд</h2>
        <div>
            <span style="font-size: 0.95rem; color: #94a3b8;">Фильтр:</span>
            <button class="filter-btn active" onclick="filterTable('all', this)">Все</button>
            <button class="filter-btn" onclick="filterTable('bad', this)">Ошибки</button>
            <button class="btn-action btn-reset-table" onclick="resetToDefaultData()"><i class="fas fa-undo"></i> Сбросить базу</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div>
            <div class="table-visible-wrapper">
                <table id="dataTable" class="white-data-table">
                    <thead>
                        <tr>
                            <th>Система</th>
                            <th>Полнота</th>
                            <th>Точность</th>
                            <th>Авто-Статус</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <div class="add-row-form-panel">
                <input type="text" id="newSystem" placeholder="Название системы" style="flex: 2; min-width: 150px;">
                <input type="text" id="newCompleteness" placeholder="Полнота" style="flex: 1; min-width: 80px;">
                <input type="text" id="newAccuracy" placeholder="Точность" style="flex: 1; min-width: 80px;">
                <button class="btn-action btn-add" onclick="addNewRow()"><i class="fas fa-plus"></i> Добавить</button>
            </div>
        </div>

        <div class="chart-glass-box">
            <h3 style="color:#fff; margin:0 0 20px 0; font-size:1.1rem;">Живой график качества</h3>
            <div style="position: relative; height: 240px; display: flex; justify-content: center;">
                <canvas id="qualityChart"></canvas>
            </div>
        </div>
    </div>

    <section class="ai-control-panel" style="background: rgba(30, 41, 59, 0.4); padding: 30px; border-radius: 15px; margin-top: 40px; border: 1px solid rgba(255,255,255,0.08);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
            <div>
                <h3 style="color:#fff;"><i class="fas fa-microchip" style="color: #1abc9c;"></i> Аналитический ИИ-Агент</h3>
                <p id="agentStatus" style="margin: 8px 0 0 0; color: #94a3b8;">Готов к сканированию бизнес-метрик...</p>
            </div>
            <button onclick="startAdvancedAnalysis()" id="aiBtn" style="padding: 14px 28px; background: #1abc9c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Запустить ИИ-аудит
            </button>
        </div>
        <div class="progress-container" id="progCont" style="width: 100%; background: #1e293b; height: 8px; border-radius: 4px; margin: 20px 0; display: none;">
            <div class="progress-bar" id="progBar" style="width: 0%; height: 100%; background: #1abc9c; border-radius: 4px; transition: width 0.2s;"></div>
        </div>
        <div id="aiOutput" style="margin-top: 20px; font-family: monospace; color: #1abc9c; display: none; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px;"></div>
        <div class="ai-report-box" id="aiReportBox" style="background: #1e293b; border-left: 4px solid #1abc9c; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; color: #ecf0f1;"></div>
    </section>
</main>

<script>
    let qualityChart;

    // Исходные данные, если LocalStorage пуст
    const defaultData = [
        { system: "CRM Система", completeness: "94%", accuracy: "88%" },
        { system: "Бухгалтерия (ERP)", completeness: "99%", accuracy: "97%" },
        { system: "Кадровый учет (HR)", completeness: "72%", accuracy: "65%" }
    ];

    window.onload = function() {
        Chart.defaults.color = '#94a3b8';
        const ctx = document.getElementById('qualityChart').getContext('2d');
        qualityChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Отлично (>=95%)', 'Норма (80-94%)', 'Критично (<80%)'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#1abc9c', '#f1c40f', '#e74c3c'],
                    borderWidth: 0
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
        loadTableData();
    };

    function saveTableToStorage() {
        const rows = document.querySelectorAll('#dataTable tbody tr');
        let tableArr = [];
        rows.forEach(row => {
            tableArr.push({
                system: row.cells[0].innerText,
                completeness: row.cells[1].innerText,
                accuracy: row.cells[2].innerText
            });
        });
        localStorage.setItem('dqTableData', JSON.stringify(tableArr));
    }

    function loadTableData() {
        let storedData = localStorage.getItem('dqTableData');
        let dataToRender = storedData ? JSON.parse(storedData) : defaultData;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        dataToRender.forEach(item => {
            const newTr = document.createElement('tr');
            newTr.innerHTML = `
                <td contenteditable="true" oninput="handleTableChange()">${item.system}</td>
                <td contenteditable="true" class="completeness-cell" oninput="handleTableChange()">${item.completeness}</td>
                <td contenteditable="true" class="accuracy-cell" oninput="handleTableChange()">${item.accuracy}</td>
                <td class="status-cell"></td>
                <td><button class="btn-action btn-delete" onclick="deleteRow(this)"><i class="fas fa-trash-alt"></i></button></td>
            `;
            tbody.appendChild(newTr);
        });
        calculateStatuses();
    }

    function handleTableChange() {
        saveTableToStorage();
        calculateStatuses();
        resetAiButtonState();
    }

    function calculateStatuses() {
        let excellentCount = 0, normalCount = 0, criticalCount = 0;
        const rows = document.querySelectorAll('#dataTable tbody tr');
        
        rows.forEach(row => {
            const accuracyCell = row.querySelector('.accuracy-cell');
            const statusCell = row.querySelector('.status-cell');
            let accuracyValue = parseInt(accuracyCell.innerText.replace(/[^0-9]/g, '')) || 0;

            if (accuracyValue >= 95) {
                statusCell.innerHTML = `<span class="badge-excellent">Отлично</span>`;
                row.setAttribute('data-status', 'excellent');
                excellentCount++;
            } else if (accuracyValue >= 80 && accuracyValue < 95) {
                statusCell.innerHTML = `<span class="badge-normal">Норма</span>`;
                row.setAttribute('data-status', 'normal');
                normalCount++;
            } else {
                statusCell.innerHTML = `<span class="badge-critical">Критично</span>`;
                row.setAttribute('data-status', 'bad');
                criticalCount++;
            }
        });

        if (qualityChart) {
            qualityChart.data.datasets[0].data = [excellentCount, normalCount, criticalCount];
            qualityChart.update();
        }
    }

    // ТА САМАЯ ФУНКЦИЯ ДОБАВЛЕНИЯ СТРОКИ
    function addNewRow() {
        const system = document.getElementById('newSystem').value.trim();
        const completeness = document.getElementById('newCompleteness').value.trim() || '100%';
        const accuracy = document.getElementById('newAccuracy').value.trim() || '0%';

        if (!system) {
            alert('Введите название системы!');
            return;
        }

        const tbody = document.getElementById('tableBody');
        const newTr = document.createElement('tr');
        newTr.innerHTML = `
            <td contenteditable="true" oninput="handleTableChange()">${system}</td>
            <td contenteditable="true" class="completeness-cell" oninput="handleTableChange()">${completeness}</td>
            <td contenteditable="true" class="accuracy-cell" oninput="handleTableChange()">${accuracy}</td>
            <td class="status-cell"></td>
            <td><button class="btn-action btn-delete" onclick="deleteRow(this)"><i class="fas fa-trash-alt"></i></button></td>
        `;
        tbody.appendChild(newTr);
        
        saveTableToStorage();
        calculateStatuses();
        resetAiButtonState();

        // Очищаем поля ввода
        document.getElementById('newSystem').value = '';
        document.getElementById('newCompleteness').value = '';
        document.getElementById('newAccuracy').value = '';
    }

    function deleteRow(buttonElem) {
        buttonElem.closest('tr').remove();
        saveTableToStorage();
        calculateStatuses();
        resetAiButtonState();
    }

    function resetToDefaultData() {
        if(confirm("Восстановить базовые три строки данных?")) {
            localStorage.removeItem('dqTableData');
            loadTableData();
            resetAiButtonState();
        }
    }

    function resetAiButtonState() {
        document.getElementById('aiBtn').disabled = false;
        document.getElementById('aiBtn').style.opacity = "1";
        document.getElementById('agentStatus').innerText = "Данные изменены. ИИ готов к перерасчету...";
    }

    function filterTable(status, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#dataTable tbody tr').forEach(row => {
            if (status === 'all') row.style.display = '';
            else row.style.display = row.getAttribute('data-status') === 'bad' ? '' : 'none';
        });
    }

    function startAdvancedAnalysis() {
        const btn = document.getElementById('aiBtn');
        const progCont = document.getElementById('progCont');
        const progBar = document.getElementById('progBar');
        const output = document.getElementById('aiOutput');
        const reportBox = document.getElementById('aiReportBox');

        // Получаем все строки таблицы
        const rows = document.querySelectorAll('#dataTable tbody tr');
        let totalRows = rows.length;

        // Если таблица пустая, ИИ сразу выдает предупреждение
        if (totalRows === 0) {
            progCont.style.display = "none";
            output.style.display = "none";
            reportBox.innerHTML = "<h4><i class='fas fa-exclamation-triangle' style='color:#e74c3c;'></i> Ошибка аудита</h4><p>Операционная база данных пуста. Добавьте хотя бы одну систему в таблицу для проведения ИКТ-анализа.</p>";
            reportBox.style.display = "block";
            return;
        }

        // Блокируем кнопку и включаем анимацию загрузки
        btn.disabled = true; 
        btn.style.opacity = "0.5";
        progCont.style.display = "block"; 
        output.style.display = "block"; 
        reportBox.style.display = "none";

        let progress = 0;
        const interval = setInterval(() => {
            progress += 20;
            progBar.style.width = progress + "%";
            
            // Красивые логи сканирования в стиле консоли
            if (progress === 20) output.innerText = "> [SCANNING]: Считывание структуры DOM и извлечение весов систем...";
            else if (progress === 40) output.innerText = "> [PARSING]: Очистка строк от символов '%' и преобразование метрик в массивы чисел...";
            else if (progress === 60) output.innerText = "> [AI_LOGIC]: Расчет математического ожидания и поиск критических отклонений...";
            else if (progress === 80) output.innerText = "> [COMPILING]: Формирование экспертного заключения по стандартам Data Governance...";

            if (progress >= 100) {
                clearInterval(interval);
                output.innerText = `> [COMPLETE]: Анализ успешно завершен. Сгенерирован динамический отчет.`;

                // Переменные для расчета реальных метрик
                let sumCompleteness = 0;
                let sumAccuracy = 0;
                let worstSystem = "";
                let worstAccuracy = 101; // Вспомогательное число для поиска минимума
                let worstCompleteness = 0;

                // Пробегаемся по каждой строчке таблицы и собираем цифры
                rows.forEach(row => {
                    const name = row.cells[0].innerText.trim() || "Неизвестная система";
                    
                    // Извлекаем только цифры из ячеек (убираем знаки % и пробелы)
                    let compVal = parseInt(row.querySelector('.completeness-cell').innerText.replace(/[^0-9]/g, '')) || 0;
                    let accVal = parseInt(row.querySelector('.accuracy-cell').innerText.replace(/[^0-9]/g, '')) || 0;

                    sumCompleteness += compVal;
                    sumAccuracy += accVal;

                    // Ищем систему с самыми худшими показателями точности
                    if (accVal < worstAccuracy) {
                        worstAccuracy = accVal;
                        worstCompleteness = compVal;
                        worstSystem = name;
                    }
                });

                // Считаем средние значения по всей таблице
                let avgCompleteness = (sumCompleteness / totalRows).toFixed(1);
                let avgAccuracy = (sumAccuracy / totalRows).toFixed(1);

                // Генерируем динамический текст отчета в зависимости от критичности ситуации
                let riskLevel = "НИЗКИЙ";
                let riskColor = "#1abc9c";
                let statusComment = "Инфраструктура работает стабильно. Критических аномалий в бизнес-метриках не обнаружено.";

                if (worstAccuracy < 80) {
                    riskLevel = "КРИТИЧЕСКИЙ (ТРЕБУЕТСЯ ВМЕШАТЕЛЬСТВО)";
                    riskColor = "#ef4444";
                    statusComment = `Обнаружен опасный вектор уязвимости данных. Источник <strong>«${worstSystem}»</strong> имеет недопустимо низкую точность (${worstAccuracy}%). Это искажает сквозную аналитику организации.`;
                } else if (worstAccuracy >= 80 && worstAccuracy < 95) {
                    riskLevel = "СРЕДНИЙ (ВЕРИФИКАЦИЯ)";
                    riskColor = "#f59e0b";
                    statusComment = `Системы работают в штатном режиме, однако источник <strong>«${worstSystem}»</strong> требует внимания и профилактической дедупликации данных.`;
                }

                // Выводим готовый красивый HTML-отчет, который зависит от содержимого таблицы
                reportBox.innerHTML = `
                    <h4 style="color: #1abc9c; margin-top: 0;"><i class="fas fa-file-medical-alt"></i> Сводный аналитический отчет ИИ-агента</h4>
                    
                    <p style="margin: 10px 0;"><strong>1. Агрегированные метрики ИКТ-инфраструктуры:</strong></p>
                    <ul style="margin: 5px 0 15px 20px; padding: 0;">
                        <li>Всего проверено информационных систем: <strong>${totalRows}</strong></li>
                        <li>Средний индекс полноты (Completeness): <strong style="color: #1abc9c;">${avgCompleteness}%</strong></li>
                        <li>Средний индекс точности (Accuracy): <strong style="color: #1abc9c;">${avgAccuracy}%</strong></li>
                    </ul>
                    
                    <p style="margin: 10px 0;"><strong>2. Оценка рисков и аномалии:</strong></p>
                    <p style="margin: 5px 0 15px 0;">Уровень угрозы Data Governance: <span style="color: ${riskColor}; font-weight: bold;">${riskLevel}</span></p>
                    <p style="margin: 5px 0 15px 0; background: rgba(15, 23, 42, 0.3); padding: 10px; border-radius: 6px; border-left: 3px solid ${riskColor};">${statusComment}</p>
                    
                    <p style="margin: 10px 0;"><strong>3. Техническое предписание ИИ-аудитора:</strong></p>
                    <ul style="margin: 5px 0 0 20px; padding: 0;">
                        <li>Для <strong>«${worstSystem}»</strong>: Принудительно запустить скрипты очистки базы данных, настроить триггеры логирования пустых полей (NULL) и проверить целостность внешних ключей.</li>
                        <li>Для остальных узлов: Провести плановый аудит входящих транзакций в течение 7 рабочих дней.</li>
                    </ul>
                `;

                // Показываем блок с отчетом и возвращаем кнопку в активное состояние
                reportBox.style.display = "block";
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.innerHTML = "<i class='fas fa-sync-alt'></i> Перезапустить ИИ-аудит";
            }
        }, 200);
    }
</script>

</body>
</html>
