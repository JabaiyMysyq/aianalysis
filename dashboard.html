<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитическая Панель | DataQuality</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Принудительное наложение стилей, чтобы внешние файлы не ломали видимость */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
            margin-top: 25px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .dashboard-grid { 
                grid-template-columns: 1fr; 
            }
        }

        /* КОНТЕЙНЕР ТАБЛИЦЫ - ГАРАНТИРУЕТ ВИДИМОСТЬ */
        .table-visible-wrapper {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            width: 100% !important;
            overflow-x: auto;
            background: #ffffff !important;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        /* СВЕТЛАЯ ТАБЛИЦА С ЧЕРНЫМ ТЕКСТОМ */
        .white-data-table {
            width: 100% !important;
            border-collapse: collapse !important;
            background-color: #ffffff !important;
            color: #0f172a !important;
            display: table !important;
        }

        .white-data-table th {
            background-color: #1abc9c !important;
            color: #ffffff !important;
            padding: 16px !important;
            font-weight: 600 !important;
            text-align: left !important;
            font-size: 0.95rem !important;
            border: none !important;
        }

        .white-data-table td {
            color: #0f172a !important;
            background-color: #ffffff !important;
            border-bottom: 1px solid #e2e8f0 !important;
            padding: 14px 16px !important;
            font-size: 0.95rem !important;
            text-align: left !important;
        }

        /* РЕДАКТИРУЕМЫЕ ЯЧЕЙКИ */
        .white-data-table td[contenteditable="true"] {
            background-color: #fffbeb !important;
            cursor: pointer !important;
        }
        
        .white-data-table td[contenteditable="true"]:focus {
            background-color: #ffffff !important;
            outline: 2px solid #1abc9c !important;
        }

        /* ПАНЕЛЬ ДОБАВЛЕНИЯ СТРОК */
        .add-row-form-panel {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(10px);
            padding: 20px !important;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            display: flex !important;
            gap: 15px !important;
            flex-wrap: wrap !important;
            width: 100% !important;
            box-sizing: border-box !important;
        }

        .add-row-form-panel input {
            padding: 10px 14px !important;
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 8px !important;
            color: #ffffff !important;
            font-family: inherit !important;
            outline: none !important;
        }

        .add-row-form-panel input::placeholder {
            color: #94a3b8 !important;
        }

        /* КНОПКИ */
        .btn-action {
            padding: 10px 16px !important;
            border: none !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            font-weight: 600 !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 8px !important;
        }
        
        .btn-add { background: #1abc9c !important; color: white !important; }
        .btn-add:hover { background: #16a085 !important; }
        
        .btn-delete { background: #fee2e2 !important; color: #ef4444 !important; padding: 6px 12px !important; font-size: 0.85rem !important; border-radius: 6px !important; }
        .btn-delete:hover { background: #ef4444 !important; color: white !important; }
        
        .btn-reset-table { background: rgba(255, 255, 255, 0.05) !important; color: #94a3b8 !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; margin-left: 10px; }

        .chart-glass-box {
            background: rgba(30, 41, 59, 0.6);
            padding: 25px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .badge-excellent { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-normal { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .badge-critical { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo">DataQuality 📊</div>
        <div class="menu">
            <a href="index.html">Главная</a>
            <a href="dashboard.html" class="active">Анализ данных</a>
            <a href="bot.html">Помощник по качеству</a>
            <a href="creators.html">Авторы</a>
        </div>
    </nav>
</header>

<main class="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
        <h2><i class="fas fa-tachometer-alt" style="color: #1abc9c;"></i> Автоматизированный ИИ-Дашборд</h2>
        <div>
            <span style="font-size: 0.95rem; color: #94a3b8;">Фильтр:</span>
            <button class="filter-btn active" onclick="filterTable('all', this)">Все</button>
            <button class="filter-btn" onclick="filterTable('bad', this)">Ошибки</button>
            <button class="btn-action btn-reset-table" onclick="resetToDefaultData()"><i class="fas fa-undo"></i> Сбросить базу</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div>
            <div class="table-visible-wrapper">
                <table id="dataTable" class="white-data-table">
                    <thead>
                        <tr>
                            <th>Система</th>
                            <th>Полнота</th>
                            <th>Точность</th>
                            <th>Авто-Статус</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <div class="add-row-form-panel">
                <input type="text" id="newSystem" placeholder="Название системы" style="flex: 2; min-width: 180px;">
                <input type="text" id="newCompleteness" placeholder="Полнота (напр. 95%)" style="flex: 1; min-width: 100px;">
                <input type="text" id="newAccuracy" placeholder="Точность (напр. 90%)" style="flex: 1; min-width: 100px;">
                <button class="btn-action btn-add" onclick="addNewRow()"><i class="fas fa-plus"></i> Добавить</button>
            </div>
        </div>

        <div class="chart-glass-box">
            <h3 style="color:#fff; margin:0 0 20px 0; font-size:1.1rem;">Живой график качества</h3>
            <div style="position: relative; height: 240px;">
                <canvas id="qualityChart"></canvas>
            </div>
        </div>
    </div>

    <section class="ai-control-panel" style="background: rgba(30, 41, 59, 0.6); padding: 30px; border-radius: 15px; margin-top: 40px; border: 1px solid rgba(255,255,255,0.08);">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
            <div>
                <h3 style="color:#fff;"><i class="fas fa-microchip" style="color: #1abc9c;"></i> Аналитический ИИ-Агент</h3>
                <p id="agentStatus" style="margin: 8px 0 0 0; color: #94a3b8;">Готов к сканированию бизнес-метрик...</p>
            </div>
            <button onclick="startAdvancedAnalysis()" id="aiBtn" style="padding: 14px 28px; background: #1abc9c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Запустить ИИ-аудит
            </button>
        </div>
        <div class="progress-container" id="progCont" style="width: 100%; background: #34495e; height: 10px; border-radius: 5px; margin: 20px 0; display: none;">
            <div class="progress-bar" id="progBar" style="width: 0%; height: 100%; background: #1abc9c; border-radius: 5px; transition: width 0.1s;"></div>
        </div>
        <div id="aiOutput" style="margin-top: 20px; font-family: monospace; color: #1abc9c; display: none;"></div>
        <div class="ai-report-box" id="aiReportBox" style="background: #1e293b; border-left: 5px solid #1abc9c; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; color: #ecf0f1;"></div>
    </section>
</main>

<script>
    let qualityChart;

    const defaultData = [
        { system: "CRM Система", completeness: "94%", accuracy: "88%" },
        { system: "Бухгалтерия (ERP)", completeness: "99%", accuracy: "97%" },
        { system: "Кадровый учет (HR)", completeness: "72%", accuracy: "65%" }
    ];

    window.onload = function() {
        Chart.defaults.color = '#94a3b8';
        const ctx = document.getElementById('qualityChart').getContext('2d');
        qualityChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Отлично (>=95%)', 'Норма (80-94%)', 'Критично (<80%)'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#1abc9c', '#f1c40f', '#e74c3c'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
        loadTableData();
    };

    function saveTableToStorage() {
        const rows = document.querySelectorAll('#dataTable tbody tr');
        let tableArr = [];
        rows.forEach(row => {
            tableArr.push({
                system: row.cells[0].innerText,
                completeness: row.cells[1].innerText,
                accuracy: row.cells[2].innerText
            });
        });
        localStorage.setItem('dqTableData', JSON.stringify(tableArr));
    }

    function loadTableData() {
        let storedData = localStorage.getItem('dqTableData');
        let dataToRender = storedData ? JSON.parse(storedData) : defaultData;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        dataToRender.forEach(item => {
            const newTr = document.createElement('tr');
            newTr.innerHTML = `
                <td contenteditable="true" oninput="handleTableChange()">${item.system}</td>
                <td contenteditable="true" class="completeness-cell" oninput="handleTableChange()">${item.completeness}</td>
                <td contenteditable="true" class="accuracy-cell" oninput="handleTableChange()">${item.accuracy}</td>
                <td class="status-cell"></td>
                <td><button class="btn-action btn-delete" onclick
