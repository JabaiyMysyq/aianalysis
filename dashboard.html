<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитическая Панель | DataQuality</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Общий контейнер-ограничитель для симметрии элементов */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
            margin-top: 20px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* Полная перезапись стилей таблицы: белый фон и черный текст */
        #dataTable {
            background-color: #ffffff !important;
            color: #000000 !important;
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        #dataTable th {
            background-color: #1abc9c !important;
            color: #ffffff !important;
            padding: 14px;
            font-weight: 600;
            border: none;
            text-align: left;
        }

        #dataTable td {
            color: #000000 !important;
            border-bottom: 1px solid #e2e8f0 !important;
            border-left: none !important;
            border-right: none !important;
            padding: 12px 14px;
        }

        /* Стили для редактируемых ячеек на светлом фоне */
        td[contenteditable="true"] {
            background-color: #fffdf0 !important;
            color: #000000 !important;
            cursor: pointer;
            transition: background 0.2s;
        }
        td[contenteditable="true"]:focus {
            background-color: #ffffff !important;
            color: #000000 !important;
            outline: 2px solid #1abc9c !important;
        }

        /* Живой график в контейнере */
        .chart-container-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 320px;
            height: 360px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .chart-container-box h3 { margin: 0 0 15px 0; font-size: 1.1rem; color: #2c3e50; }

        /* Панель добавления новых строк, подогнанная под размеры */
        .add-row-form {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
            box-sizing: border-box;
        }

        .add-row-form input {
            padding: 10px 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-row-form input:focus {
            border-color: #1abc9c;
        }

        .btn-action {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-add { background: #1abc9c; color: white; }
        .btn-add:hover { background: #16a085; box-shadow: 0 0 12px rgba(26, 188, 156, 0.3); }
        .btn-delete { background: #e74c3c; color: white; padding: 6px 12px; font-size: 0.85rem; border-radius: 6px; }
        .btn-delete:hover { background: #c0392b; }
        .btn-reset-table { background: #7f8c8d; color: white; margin-left: 10px; }
        .btn-reset-table:hover { background: #95a5a6; }

        /* Статусы */
        .badge-excellent { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .badge-normal { background: #fef3c7; color: #92400e; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .badge-critical { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }

        .ai-control-panel {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 15px; margin-top: 40px;
        }

        .progress-container {
            width: 100%; background: #34495e; height: 10px; border-radius: 5px; margin: 20px 0; display: none;
        }

        .progress-bar { width: 0%; height: 100%; background: #1abc9c; border-radius: 5px; transition: width 0.1s; }

        .ai-report-box {
            background: #1e293b;
            border-left: 5px solid #1abc9c;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
            color: #ecf0f1;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
