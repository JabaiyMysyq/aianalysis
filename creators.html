<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторы | DataQuality</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Базовые стили для темной темы сайта */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1623;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка сайта (Навигация) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(13, 22, 35, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #10b981; /* Зеленый фирменный цвет */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        nav a.active {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
        }

        /* Основной контент */
        main {
            flex: 1;
            padding: 60px 8%;
            max-width: 1200px;
            margin: 0 auto;
            width: -webkit-fill-available;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        /* ИСПРАВЛЕННАЯ СЕТКА: Контейнер для карточек разработчиков */
        .creators-grid {
            display: flex;
            gap: 30px;
            flex-wrap: wrap; /* Чтобы на мобилках карточки переносились вниз */
            margin-top: 20px;
        }

        /* Стили для карточки автора */
        .creator-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            flex: 1;
            min-width: 280px; /* Чтобы карточки не сжимались слишком сильно */
            max-width: 450px;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
